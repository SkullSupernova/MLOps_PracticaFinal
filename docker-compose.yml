version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: kmnist-api:latest
    container_name: kmnist_inference
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/ResNet_Final_Combined.pth
      - DATASET_MEAN=0.1918
      - DATASET_STD=0.3483
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s